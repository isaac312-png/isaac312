<!DOCTYPE html>
<html>
<head>
    <title>Test OTP Verification</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { background: #0a0c10; color: white; font-family: monospace; padding: 20px; }
        input, button { padding: 12px; margin: 8px 0; width: 100%; border-radius: 8px; border: none; }
        button { background: #26914a; color: white; cursor: pointer; }
        pre { background: #14181f; padding: 12px; border-radius: 8px; overflow-x: auto; }
    </style>
</head>
<body>
    <h2>Test OTP Verification</h2>
    <input type="email" id="email" placeholder="Email">
    <input type="text" id="otp" placeholder="OTP">
    <button onclick="verify()">Verify OTP</button>
    <pre id="result">Result will appear here...</pre>

    <script>
        async function verify() {
            const email = document.getElementById('email').value;
            const otp = document.getElementById('otp').value;
            const resultDiv = document.getElementById('result');
            resultDiv.innerText = 'Verifying...';
            try {
                const res = await fetch('https://isaac312.onrender.com/api/verify', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, otp })
                });
                const data = await res.json();
                resultDiv.innerText = JSON.stringify(data, null, 2);
            } catch (err) {
                resultDiv.innerText = 'Error: ' + err.message;
            }
        }
    </script>
</body>
</html>
