<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <title>Admin Dashboard | Trade Global Market</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0a0c10;
            font-family: 'Inter', sans-serif;
            color: #eef2ff;
            padding: 20px;
        }
        .admin-container {
            max-width: 1400px;
            margin: 0 auto;
        }
        /* Logo Section (like login page) */
        .logo-section {
            text-align: center;
            margin-bottom: 32px;
        }
        .logo-section img {
            max-width: 140px;
            height: auto;
            margin-bottom: 12px;
        }
        .logo-section h1 {
            font-size: 1.6rem;
            font-weight: 700;
            background: linear-gradient(135deg, #fff, #26914a);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .logo-section p {
            font-size: 0.75rem;
            color: #8f9bb3;
            margin-top: 4px;
        }
        /* Header (stats + logout) */
        .admin-header {
            background: #14181f;
            border-radius: 32px;
            padding: 20px 24px;
            margin-bottom: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
            border: 1px solid rgba(255,255,255,0.08);
        }
        .stats {
            display: flex;
            gap: 16px;
        }
        .stat-card {
            background: rgba(255,255,255,0.05);
            padding: 12px 24px;
            border-radius: 24px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .stat-card h3 {
            font-size: 1.6rem;
            color: white;
        }
        .stat-card p {
            font-size: 0.7rem;
            color: #aaa;
        }
        .logout-btn {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            padding: 10px 24px;
            border-radius: 60px;
            color: white;
            cursor: pointer;
            transition: 0.2s;
        }
        .logout-btn:hover {
            background: rgba(255,255,255,0.2);
        }
        /* Tabs */
        .admin-tabs {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 8px;
        }
        .tab-btn {
            background: transparent;
            border: none;
            color: #aaa;
            font-size: 1rem;
            font-weight: 500;
            padding: 10px 24px;
            cursor: pointer;
            transition: 0.2s;
            border-radius: 40px;
        }
        .tab-btn.active {
            background: rgba(255,255,255,0.1);
            color: white;
        }
        .tab-pane {
            display: none;
        }
        .tab-pane.active {
            display: block;
        }
        /* Search & Filter (Users tab) */
        .search-section {
            background: #14181f;
            border-radius: 24px;
            padding: 16px 20px;
            margin-bottom: 24px;
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            align-items: center;
            border: 1px solid rgba(255,255,255,0.08);
        }
        .search-box {
            flex: 1;
            position: relative;
        }
        .search-box i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #aaa;
        }
        .search-box input {
            width: 100%;
            padding: 12px 16px 12px 42px;
            background: #0a0c10;
            border: 1px solid #2d3748;
            border-radius: 60px;
            color: white;
            outline: none;
        }
        .filter-buttons {
            display: flex;
            gap: 12px;
        }
        .filter-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.2);
            padding: 8px 20px;
            border-radius: 60px;
            color: white;
            cursor: pointer;
            transition: 0.2s;
        }
        .filter-btn.active {
            background: white;
            color: black;
        }
        /* Users Cards (unchanged layout) */
        .users-cards {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .user-card {
            background: #14181f;
            border-radius: 28px;
            padding: 20px;
            border: 1px solid rgba(255,255,255,0.08);
        }
        .user-card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .user-name {
            font-weight: bold;
            font-size: 1.1rem;
            color: white;
        }
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 12px;
            border-radius: 40px;
            font-size: 0.7rem;
            background: rgba(255,255,255,0.1);
        }
        .status-online {
            background: rgba(100,255,100,0.2);
            color: #88ff88;
        }
        .status-offline {
            background: rgba(255,100,100,0.2);
            color: #ff8888;
        }
        .user-info-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            font-size: 0.85rem;
            border-bottom: 1px dashed rgba(255,255,255,0.05);
        }
        .balance-control {
            display: flex;
            gap: 12px;
            margin-top: 16px;
        }
        .balance-control input {
            flex: 1;
            padding: 10px 16px;
            background: #0a0c10;
            border: 1px solid #2d3748;
            border-radius: 60px;
            color: white;
        }
        .apply-btn {
            background: white;
            color: black;
            border: none;
            padding: 8px 20px;
            border-radius: 60px;
            font-weight: bold;
            cursor: pointer;
        }
        /* OTP Logs – Vertical Cards (new design) */
        .otp-cards-container {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .otp-card {
            background: #14181f;
            border-radius: 28px;
            padding: 16px 20px;
            border: 1px solid rgba(255,255,255,0.08);
            transition: 0.2s;
        }
        .otp-card:hover {
            border-color: rgba(38,145,74,0.4);
        }
        .otp-card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 12px;
        }
        .otp-email {
            font-weight: 600;
            color: white;
            word-break: break-all;
        }
        .otp-code {
            background: #0a0c10;
            padding: 6px 14px;
            border-radius: 40px;
            font-family: monospace;
            font-size: 1rem;
            letter-spacing: 1px;
            color: #26914a;
            font-weight: bold;
        }
        .otp-details {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 8px;
            font-size: 0.8rem;
            color: #8f9bb3;
        }
        .otp-status {
            padding: 4px 12px;
            border-radius: 40px;
            font-size: 0.7rem;
            font-weight: 600;
        }
        .status-used {
            background: rgba(100,255,100,0.2);
            color: #88ff88;
        }
        .status-pending {
            background: rgba(255,100,100,0.2);
            color: #ff8888;
        }
        .copy-otp-btn {
            background: #26914a;
            border: none;
            padding: 6px 16px;
            border-radius: 40px;
            color: white;
            cursor: pointer;
            font-size: 0.75rem;
            transition: 0.2s;
        }
        .copy-otp-btn:hover {
            background: #1e7a3e;
        }
        .refresh-btn {
            background: #26914a;
            border: none;
            padding: 8px 20px;
            border-radius: 40px;
            color: white;
            cursor: pointer;
            font-size: 0.85rem;
            margin-bottom: 16px;
        }
        .refresh-btn:hover {
            background: #1e7a3e;
        }
        .loading {
            text-align: center;
            padding: 40px;
            color: #aaa;
        }
        .footer {
            text-align: center;
            padding: 24px;
            font-size: 0.7rem;
            color: #5a6874;
            margin-top: 24px;
            border-top: 1px solid rgba(255,255,255,0.05);
        }
        @media (max-width: 640px) {
            body { padding: 16px; }
            .admin-header { flex-direction: column; text-align: center; }
            .stats { justify-content: center; }
            .user-card-header { flex-direction: column; gap: 12px; align-items: flex-start; }
            .otp-card-header { flex-direction: column; align-items: flex-start; }
            .otp-details { flex-direction: column; align-items: flex-start; }
        }
    </style>
</head>
<body>
<div class="admin-container">
    <!-- Logo Section (matching login page) -->
    <div class="logo-section">
        <img src="/static/logo.png" alt="TGM Logo" onerror="this.src='/static/placeholder.jpg'">
        <h1>Trade Global Market</h1>
        <p>Admin Dashboard</p>
    </div>

    <!-- Header with stats and logout -->
    <div class="admin-header">
        <div class="stats">
            <div class="stat-card">
                <h3 id="totalUsersCount">0</h3>
                <p>Total Users</p>
            </div>
            <div class="stat-card">
                <h3 id="onlineUsersCount">0</h3>
                <p>Online Now</p>
            </div>
        </div>
        <button id="logoutBtn" class="logout-btn">Logout</button>
    </div>

    <!-- Tabs -->
    <div class="admin-tabs">
        <button class="tab-btn active" data-tab="users">👥 Users</button>
        <button class="tab-btn" data-tab="otp">🔐 OTP Logs</button>
    </div>

    <!-- Users Tab Pane -->
    <div id="usersTab" class="tab-pane active">
        <div class="search-section">
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" id="searchInput" placeholder="Search by name or email...">
            </div>
            <div class="filter-buttons">
                <button class="filter-btn active" data-filter="all">All</button>
                <button class="filter-btn" data-filter="online">Online</button>
                <button class="filter-btn" data-filter="offline">Offline</button>
            </div>
        </div>
        <div id="usersContainer">
            <div class="loading"><i class="fas fa-spinner fa-spin"></i> Loading clients...</div>
        </div>
    </div>

    <!-- OTP Logs Tab Pane (Vertical Cards) -->
    <div id="otpTab" class="tab-pane">
        <div style="display: flex; justify-content: flex-end; margin-bottom: 16px;">
            <button id="refreshOtpBtn" class="refresh-btn"><i class="fas fa-sync-alt"></i> Refresh OTP Logs</button>
        </div>
        <div id="otpContainer" class="otp-cards-container">
            <div class="loading"><i class="fas fa-spinner fa-spin"></i> Click Refresh to load OTP logs...</div>
        </div>
    </div>

    <div class="footer">
        <p>&copy; 2025 Trade Global Market. All rights reserved.</p>
    </div>
</div>

<script>
    const API = 'https://isaac312.onrender.com/api';
    const token = localStorage.getItem('adminToken');
    if (!token) window.location.href = 'admin-login.html';

    let allUsers = [];
    let currentFilter = 'all';
    let searchTerm = '';

    // ---------- TAB SWITCHING ----------
    const tabs = document.querySelectorAll('.tab-btn');
    const usersTab = document.getElementById('usersTab');
    const otpTab = document.getElementById('otpTab');
    tabs.forEach(btn => {
        btn.addEventListener('click', () => {
            tabs.forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            const tab = btn.dataset.tab;
            if (tab === 'users') {
                usersTab.classList.add('active');
                otpTab.classList.remove('active');
                fetchUsers();
            } else {
                usersTab.classList.remove('active');
                otpTab.classList.add('active');
                fetchOtpLogs();
            }
        });
    });

    // ---------- USERS SECTION (unchanged functionality) ----------
    async function fetchUsers() {
        try {
            const res = await fetch(`${API}/admin/users`, { 
                headers: { 'Authorization': `Bearer ${token}` } 
            });
            if (res.status === 403 || res.status === 401) { 
                localStorage.removeItem('adminToken'); 
                window.location.href = 'admin-login.html'; 
                return; 
            }
            allUsers = await res.json();
            updateStats();
            renderUsers();
        } catch (err) {
            console.error(err);
            document.getElementById('usersContainer').innerHTML = '<div class="loading">Error loading users</div>';
        }
    }

    function updateStats() {
        const now = Date.now();
        const onlineCount = allUsers.filter(u => (now - (u.last_seen || 0)) < 120000).length;
        document.getElementById('totalUsersCount').innerText = allUsers.length;
        document.getElementById('onlineUsersCount').innerText = onlineCount;
    }

    function renderUsers() {
        const now = Date.now();
        let filtered = [...allUsers];
        if (currentFilter === 'online') {
            filtered = filtered.filter(u => (now - (u.last_seen || 0)) < 120000);
        } else if (currentFilter === 'offline') {
            filtered = filtered.filter(u => (now - (u.last_seen || 0)) >= 120000);
        }
        if (searchTerm) {
            const term = searchTerm.toLowerCase();
            filtered = filtered.filter(u => 
                u.first_name.toLowerCase().includes(term) || 
                u.last_name.toLowerCase().includes(term) || 
                u.email.toLowerCase().includes(term)
            );
        }
        if (filtered.length === 0) {
            document.getElementById('usersContainer').innerHTML = '<div class="loading">No users found</div>';
            return;
        }
        const html = `<div class="users-cards">${filtered.map(u => {
            const online = (now - (u.last_seen || 0)) < 120000;
            const total = (u.deposit_balance || 0) + (u.profit_accumulated || 0);
            return `
                <div class="user-card">
                    <div class="user-card-header">
                        <div class="user-name"><i class="fas fa-user-circle"></i> ${escapeHtml(u.first_name)} ${escapeHtml(u.last_name)}</div>
                        <div class="status-badge ${online ? 'status-online' : 'status-offline'}">
                            <i class="fas fa-circle"></i> ${online ? 'Online' : 'Offline'}
                        </div>
                    </div>
                    <div class="user-info-row"><span>Email</span><span>${escapeHtml(u.email)}</span></div>
                    <div class="user-info-row"><span>Deposit</span><span>€${(u.deposit_balance || 0).toFixed(2)}</span></div>
                    <div class="user-info-row"><span>Invested</span><span>€${(u.invested_amount || 0).toFixed(2)}</span></div>
                    <div class="user-info-row"><span>Profit</span><span>€${(u.profit_accumulated || 0).toFixed(2)}</span></div>
                    <div class="user-info-row"><span>Total</span><span>€${total.toFixed(2)}</span></div>
                    <div class="balance-control">
                        <input type="number" id="amt-${u.id}" placeholder="+/- amount" step="0.01" value="0">
                        <button class="apply-btn" onclick="adjustBalance(${u.id})">Apply</button>
                    </div>
                </div>
            `;
        }).join('')}</div>`;
        document.getElementById('usersContainer').innerHTML = html;
    }

    window.adjustBalance = async (userId) => {
        const amount = parseFloat(document.getElementById(`amt-${userId}`).value);
        if (isNaN(amount)) return alert('Enter a valid number');
        try {
            const res = await fetch(`${API}/admin/users/${userId}/balance`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                body: JSON.stringify({ amount })
            });
            if (res.ok) {
                alert(`Balance ${amount >= 0 ? 'added' : 'subtracted'} successfully!`);
                fetchUsers();
            } else {
                alert('Error updating balance');
            }
        } catch (err) {
            alert('Network error');
        }
    };

    document.getElementById('searchInput')?.addEventListener('input', (e) => {
        searchTerm = e.target.value;
        renderUsers();
    });
    document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentFilter = btn.dataset.filter;
            renderUsers();
        });
    });

    // ---------- OTP LOGS SECTION (Vertical Cards) ----------
    async function fetchOtpLogs() {
        const container = document.getElementById('otpContainer');
        container.innerHTML = '<div class="loading"><i class="fas fa-spinner fa-spin"></i> Loading OTP logs...</div>';
        try {
            const res = await fetch(`${API}/admin/otp-logs`, { 
                headers: { 'Authorization': `Bearer ${token}` } 
            });
            if (res.status === 403 || res.status === 401) {
                container.innerHTML = '<div class="loading" style="color:#ff8888;">Unauthorized – please re-login as admin</div>';
                return;
            }
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            const logs = await res.json();
            renderOtpCards(logs);
        } catch (err) {
            console.error('Fetch OTP logs error:', err);
            container.innerHTML = '<div class="loading" style="color:#ff8888;">Error loading OTP logs. Check console for details.</div>';
        }
    }

    function renderOtpCards(logs) {
        const container = document.getElementById('otpContainer');
        if (!logs || logs.length === 0) {
            container.innerHTML = '<div class="loading">No OTP logs found</div>';
            return;
        }
        container.innerHTML = logs.map(log => `
            <div class="otp-card">
                <div class="otp-card-header">
                    <div class="otp-email"><i class="fas fa-envelope"></i> ${escapeHtml(log.email)}</div>
                    <div class="otp-code">${log.otp}</div>
                </div>
                <div class="otp-details">
                    <div><i class="fas fa-calendar-alt"></i> ${new Date(log.created_at).toLocaleString()}</div>
                    <div><span class="otp-status ${log.used ? 'status-used' : 'status-pending'}">${log.used ? 'Used' : 'Pending'}</span></div>
                    <button class="copy-otp-btn" data-otp="${log.otp}">Copy OTP</button>
                </div>
            </div>
        `).join('');
        // Attach copy handlers
        document.querySelectorAll('.copy-otp-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const otp = btn.dataset.otp;
                navigator.clipboard.writeText(otp);
                btn.innerText = 'Copied!';
                setTimeout(() => btn.innerText = 'Copy OTP', 1500);
            });
        });
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    document.getElementById('refreshOtpBtn')?.addEventListener('click', fetchOtpLogs);
    document.getElementById('logoutBtn').onclick = () => {
        localStorage.removeItem('adminToken');
        window.location.href = 'admin-login.html';
    };

    // Initial load (users tab active)
    fetchUsers();
    setInterval(fetchUsers, 10000);
</script>
</body>
</html>
